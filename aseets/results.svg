<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" font-family="'Comic Sans MS','Chalkboard SE','Baloo 2',cursive,sans-serif">
  <defs>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="0" flood-color="#1f2933" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="gBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd479"/>
      <stop offset="1" stop-color="#f7b733"/>
    </linearGradient>
    <linearGradient id="gTrained" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5ad0e0"/>
      <stop offset="1" stop-color="#2bb3c9"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="940" height="560" rx="28" fill="#fbf7ef"/>
  <rect x="10" y="10" width="920" height="540" rx="24" fill="none" stroke="#1f2933" stroke-width="4"/>

  <!-- title -->
  <text x="470" y="66" text-anchor="middle" font-size="40" font-weight="bold" fill="#1f2933">Auto-BenchMax Results</text>
  <text x="470" y="98" text-anchor="middle" font-size="19" fill="#6b7280">one iteration of skill-synthesized data · Qwen3-Coder-30B-A3B</text>

  <!-- legend -->
  <rect x="300" y="118" width="24" height="24" rx="7" fill="url(#gBase)" stroke="#1f2933" stroke-width="3"/>
  <text x="332" y="136" font-size="19" fill="#1f2933">Base model</text>
  <rect x="470" y="118" width="24" height="24" rx="7" fill="url(#gTrained)" stroke="#1f2933" stroke-width="3"/>
  <text x="502" y="136" font-size="19" fill="#1f2933">After training</text>

  <!-- baseline -->
  <line x1="90" y1="460" x2="850" y2="460" stroke="#1f2933" stroke-width="4" stroke-linecap="round"/>

  <!-- top-right emphasis sticky note -->
  <g transform="translate(688 220) rotate(-5)">
    <rect x="-150" y="-58" width="300" height="116" rx="18" fill="#fff3c4" stroke="#1f2933" stroke-width="4" filter="url(#ds)"/>
    <text x="0" y="-16" text-anchor="middle" font-size="30" font-weight="bold" fill="#e8590c">Just 1 iteration!</text>
    <text x="0" y="14" text-anchor="middle" font-size="16" fill="#1f2933">these gains come from a</text>
    <text x="0" y="38" text-anchor="middle" font-size="16" fill="#1f2933">single iteration of synthesized data</text>
  </g>

  <!-- ===== Group 1: Tau2-bench (telecom) : 35.96 -> 85.09 ===== -->
  <!-- base bar: 35.96 * 3.2 = 115 -->
  <rect x="205" y="345" width="110" height="115" rx="14" fill="url(#gBase)" stroke="#1f2933" stroke-width="4" filter="url(#ds)"/>
  <text x="260" y="332" text-anchor="middle" font-size="24" font-weight="bold" fill="#1f2933">35.96</text>
  <!-- trained bar: 85.09 * 3.2 = 272 -->
  <rect x="335" y="188" width="110" height="272" rx="14" fill="url(#gTrained)" stroke="#1f2933" stroke-width="4" filter="url(#ds)"/>
  <text x="390" y="175" text-anchor="middle" font-size="24" font-weight="bold" fill="#1f2933">85.09</text>
  <!-- multiplier bubble (right of trained bar) -->
  <g transform="translate(487 232)">
    <ellipse cx="0" cy="0" rx="40" ry="26" fill="#ff6b6b" stroke="#1f2933" stroke-width="4"/>
    <text x="0" y="8" text-anchor="middle" font-size="23" font-weight="bold" fill="#fff">2.4×</text>
  </g>
  <!-- group label -->
  <text x="325" y="498" text-anchor="middle" font-size="24" font-weight="bold" fill="#1f2933">Tau2-bench</text>
  <text x="325" y="524" text-anchor="middle" font-size="18" fill="#6b7280">(telecom)</text>

  <!-- ===== Group 2: MCP-Atlas : 19.1 -> 40.4 ===== -->
  <!-- base bar: 19.1 * 3.2 = 61 -->
  <rect x="545" y="399" width="110" height="61" rx="14" fill="url(#gBase)" stroke="#1f2933" stroke-width="4" filter="url(#ds)"/>
  <text x="600" y="386" text-anchor="middle" font-size="24" font-weight="bold" fill="#1f2933">19.1</text>
  <!-- trained bar: 40.4 * 3.2 = 129 -->
  <rect x="675" y="331" width="110" height="129" rx="14" fill="url(#gTrained)" stroke="#1f2933" stroke-width="4" filter="url(#ds)"/>
  <text x="730" y="318" text-anchor="middle" font-size="24" font-weight="bold" fill="#1f2933">40.4</text>
  <!-- multiplier bubble (right of trained bar) -->
  <g transform="translate(827 375)">
    <ellipse cx="0" cy="0" rx="40" ry="26" fill="#ff6b6b" stroke="#1f2933" stroke-width="4"/>
    <text x="0" y="8" text-anchor="middle" font-size="23" font-weight="bold" fill="#fff">2.1×</text>
  </g>
  <!-- group label -->
  <text x="665" y="498" text-anchor="middle" font-size="24" font-weight="bold" fill="#1f2933">MCP-Atlas</text>
  <text x="665" y="524" text-anchor="middle" font-size="18" fill="#6b7280">(public set)</text>
</svg>
